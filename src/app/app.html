<div class="container py-4">
  <div class="mb-3">
    <h1>ProductShop</h1>
    <p class="text-muted mb-1">{{ products.length | number }} Produits</p>
    <p class="text-muted mb-1">Total : {{ cartTotal | currency:'EUR':'symbol':'1.2-2' }}</p>
    <p class="text-muted">{{ today | date:'dd/MM/yyyy' }}</p>
  </div>

  <div class="card p-3 mb-4 shadow-sm">
    <app-product-filter></app-product-filter>
  </div>

  <hr>

  <div class="d-flex flex-wrap gap-3 p-3">
    @for (p of products; track p.id) {
      <app-product-card [product]="p"></app-product-card>
    }
  </div>

  @if (selectedProduct) {
    <pre class="debug">{{ selectedProduct | json }}</pre>
  }

  <app-product-list
    [products]="filteredProducts"
    [selectedId]="selectedProduct?.id ?? null">
  </app-product-list>
</div>
